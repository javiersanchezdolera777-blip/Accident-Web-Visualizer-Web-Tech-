<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVis - Panel de Administración</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="admin-body">

    <header>
        <h1>🛡️ AVis - Zona de Administración</h1>
        <a href="../index.html" class="admin-btn" style="background-color: #7f8c8d;">Volver al Mapa</a>
    </header>

    <div id="login-section" class="login-container">
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <div style="margin-bottom: 15px;">
                <label for="admin-user"><strong>Usuario:</strong></label><br>
                <input type="text" id="admin-user" style="width: 100%; padding: 8px; margin-top: 5px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label for="admin-pass"><strong>Contraseña:</strong></label><br>
                <input type="password" id="admin-pass" style="width: 100%; padding: 8px; margin-top: 5px;">
            </div>
            <button id="btn-login" style="width: 100%; padding: 10px; background-color: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                Entrar
            </button>
            <p id="login-error" style="color: red; display: none; text-align: center; margin-top: 10px;">Credenciales incorrectas</p>
        </div>
    </div>

    <div id="dashboard-section" class="admin-dashboard" style="display: none; padding: 20px;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Gestión de Accidentes</h2>
            <div>
                <button id="btn-add-new" style="padding: 10px 15px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px;">
                    + Añadir Accidente
                </button>
                <button id="btn-logout" style="padding: 10px 15px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    Cerrar Sesión
                </button>
            </div>
        </div>

        <div style="overflow-x: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <table class="admin-table" style="width: 100%; border-collapse: collapse;">
                <thead style="background-color: #2c3e50; color: white;">
                    <tr>
                        <th style="padding: 10px; text-align: left;">ID</th>
                        <th style="padding: 10px; text-align: left;">Fecha</th>
                        <th style="padding: 10px; text-align: left;">Estado</th>
                        <th style="padding: 10px; text-align: left;">Severidad</th>
                        <th style="padding: 10px; text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 20px;">Cargando datos...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../assets/js/admin.js"></script>
</body>
</html>
